[package]
name = "koia-shell"
version = "0.1.0"
edition = "2021"

[dependencies]
clap = { version = "4.6.0", features = ["derive"] }
clap_derive = { version = "4.0.0-rc.1" }
config = "0.15.23"
dirs = "6.0.0"
env_logger = "0.11.10"
freedesktop-desktop-entry = "0.8.1"
freedesktop-icons = "0.4.0"
log = "0.4.32"
niri-ipc = "26.4.0"
serde = "1.0.228"
slint = { version = "=1.16.1", default-features = false, features = [
    "accessibility",
    "compat-1-2",
    "renderer-skia",
    "std",
    "backend-winit",
    "gettext",
] }
spell-framework = { git = "https://github.com/VimYoung/Spell", ver = "e274e1efbd231664930cdc92ae8b6a9380979966" }

toml = "1.1.2"

[build-dependencies]
slint-build = "=1.16.1"
